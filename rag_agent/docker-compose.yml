services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Wait for Postgres to be ready; migrations then run on bootstrap.
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # In-network DB host (overrides the localhost value in .env).
      DATABASE_URL: postgres://rag:rag@postgres:5432/rag
      PORT: 3000
      STORAGE_DIR: /app/storage
      # Vertex ADC, auto-discovered from the mounted gcloud config below.
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
    ports:
      - "3000:3000"
    volumes:
      # Persist uploaded PDFs across container restarts.
      - pdfstorage:/app/storage
      # Mount host gcloud Application Default Credentials so Vertex embeddings
      # work inside the container (read-only). Comment out if not using ADC.
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    restart: unless-stopped

volumes:
  pgdata:
  pdfstorage:
